        </div>

    </div>
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
    <header
        class="site-header fixed top-0 w-full z-50 bg-[#0D1B2A]/70 backdrop-blur-xl shadow-[0_0_20px_rgba(0,218,243,0.1)]">
        <div class="site-header__inner flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
            <div class="site-brand text-2xl font-black text-[#00daf3] tracking-tighter font-headline"></div>
            <nav class="site-nav hidden md:flex items-center space-gap-8 gap-8" aria-label="Primary">
                <div class="site-nav__links flex items-center gap-8" id="nav-links"></div>
            </nav>

            <section class="section-personal grid grid-cols-1 md:grid-cols-2 gap-8 mb-32">

                    <div class="language-grid grid grid-cols-3 gap-4"></div>

                <div
